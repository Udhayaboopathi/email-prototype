worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;
  client_max_body_size 30M;
  proxy_read_timeout 300s;

  upstream backend_upstream {
    server backend:8000;
  }

  upstream frontend_upstream {
    server frontend:3000;
  }

  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name nexudo.dev mail.nexudo.dev;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; frame-ancestors 'none';" always;

    # ── Tracking (never cache) ─────────────────────────────────────────────
    location /api/track/ {
      proxy_no_cache 1;
      proxy_cache_bypass 1;
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # ── Backend API ───────────────────────────────────────────────────────
    location /api/v1/ {
      client_max_body_size 30M;
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Next.js hashed static chunks — cache forever (content-addressed) ──
    # These filenames contain a build hash, so they NEVER change content.
    # Safe to cache indefinitely; a new deploy produces new filenames.
    location /_next/static/ {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ── Next.js image optimisation ────────────────────────────────────────
    location /_next/image {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      add_header Cache-Control "public, max-age=86400" always;
    }

    # ── Public static files (manifest, sw.js, icons) ─────────────────────
    location /manifest.json {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=3600" always;
    }

    # Service worker must NEVER be cached so browser always gets the latest.
    location /sw.js {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
      add_header Service-Worker-Allowed "/" always;
    }

    # ── All other routes — Next.js pages (HTML must never be cached) ───────
    # HTML references hashed chunk filenames. If stale HTML is served after
    # a redeploy, the browser requests old chunk hashes → 404.
    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      # HTML / pages: NEVER cache
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
      add_header Pragma "no-cache" always;
    }
  }
}
